<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oracle Lens | Authentication</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0a0e17;
            color: #e2e8f0;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Animated background grid */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background:
                linear-gradient(rgba(59,130,246,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(59,130,246,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            animation: gridMove 20s linear infinite;
            z-index: 0;
        }

        @keyframes gridMove {
            0% { transform: translate(0, 0); }
            100% { transform: translate(40px, 40px); }
        }

        /* Radial glow */
        body::after {
            content: '';
            position: fixed;
            top: 50%; left: 50%;
            width: 600px; height: 600px;
            transform: translate(-50%, -50%);
            background: radial-gradient(circle, rgba(59,130,246,0.08) 0%, transparent 70%);
            z-index: 0;
        }

        .login-container {
            position: relative;
            z-index: 1;
            width: 440px;
            text-align: center;
        }

        .logo-hex {
            width: 80px; height: 80px;
            margin: 0 auto 24px;
            position: relative;
        }

        .logo-hex svg {
            width: 80px; height: 80px;
        }

        .brand-title {
            font-size: 32px;
            font-weight: 800;
            letter-spacing: 2px;
            margin-bottom: 4px;
            background: linear-gradient(135deg, #e2e8f0, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .brand-subtitle {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            color: #64748b;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 40px;
        }

        .login-card {
            background: rgba(17, 24, 39, 0.8);
            border: 1px solid #1e3a5f;
            border-radius: 12px;
            padding: 40px;
            backdrop-filter: blur(20px);
        }

        .login-card h2 {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            color: #06b6d4;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 24px;
        }

        .input-group {
            position: relative;
            margin-bottom: 20px;
        }

        .input-group input {
            width: 100%;
            padding: 14px 16px;
            background: #0d1520;
            border: 1px solid #1e3a5f;
            border-radius: 8px;
            color: #e2e8f0;
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        .input-group input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
        }

        .input-group input::placeholder {
            color: #475569;
        }

        .error-msg {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #ef4444;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 16px;
            font-family: 'JetBrains Mono', monospace;
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            border: none;
            border-radius: 8px;
            color: white;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s;
        }

        .submit-btn:hover {
            background: linear-gradient(135deg, #60a5fa, #3b82f6);
            box-shadow: 0 4px 20px rgba(59,130,246,0.3);
            transform: translateY(-1px);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .footer-badges {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 30px;
        }

        .badge {
            font-family: 'JetBrains Mono', monospace;
            font-size: 9px;
            font-weight: 600;
            letter-spacing: 1px;
            padding: 4px 10px;
            border-radius: 4px;
            color: white;
        }

        .badge-blue { background: rgba(59,130,246,0.3); color: #60a5fa; }
        .badge-green { background: rgba(16,185,129,0.3); color: #34d399; }
        .badge-purple { background: rgba(139,92,246,0.3); color: #a78bfa; }

        .version-text {
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            color: #334155;
            margin-top: 24px;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo-hex">
            <svg viewBox="0 0 80 80">
                <polygon points="40,4 72,22 72,58 40,76 8,58 8,22"
                         fill="#1e3a5f" stroke="#3b82f6" stroke-width="2"/>
                <text x="40" y="45" text-anchor="middle" fill="#60a5fa"
                      font-family="JetBrains Mono" font-size="16" font-weight="700">OL</text>
            </svg>
        </div>

        <div class="brand-title">ORACLE LENS</div>
        <div class="brand-subtitle">Autonomous Software Development Team</div>

        <div class="login-card">
            <h2>Authentication Required</h2>

            {% if error %}
            <div class="error-msg">{{ error }}</div>
            {% endif %}

            <form method="POST" action="/login">
                <div class="input-group">
                    <input type="password" name="password" placeholder="Enter access credential"
                           autofocus autocomplete="off">
                </div>
                <button type="submit" class="submit-btn">Authenticate</button>
            </form>
        </div>

        <div class="footer-badges">
            <span class="badge badge-blue">MULTI-AGENT</span>
            <span class="badge badge-green">GOVERNANCE</span>
            <span class="badge badge-purple">AI-NATIVE SDLC</span>
        </div>

        <div class="version-text">v2.1 | Enterprise Edition | Powered by Claude AI</div>
    </div>
</body>
</html>
